<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editorial Studio — Pro Capture Mode</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  background: #050505;
  font-family: 'Inter', sans-serif;
}

/* MAIN SHOWCASE */
.showcase {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at top left, rgba(255,255,255,.06), transparent 35%),
              linear-gradient(180deg, hsl(206,4%,24%) 0%, hsl(206,4%,8%) 100%);
}

/* grain noise overlay */
.showcase::before {
  content: "";
  position: absolute;
  inset: 0;
  opacity: .12;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

/* decorative circles */
.circle {
  position: absolute;
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.c1 { width: 720px; height: 720px; left: 220px; top: -420px; }
.c2 { width: 560px; height: 560px; left: 120px; bottom: -260px; }

/* LEFT editorial column */
.left {
  position: absolute;
  left: 70px;
  top: 140px;
  width: 430px;
  z-index: 5;
}
.logoBox {
  width: 82px;
  height: 82px;
  border: 1px solid rgba(255,255,255,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 42px;
  backdrop-filter: blur(4px);
  background: rgba(0,0,0,0.2);
  border-radius: 20px;
}
.logoBox svg {
  width: 44px;
  height: 44px;
}
.title {
  color: white;
  font-family: "Cormorant Garamond", serif;
  font-size: 112px;
  line-height: .9;
  font-weight: 300;
  letter-spacing: -3px;
  margin-bottom: 70px;
}
.features {
  display: flex;
  flex-direction: column;
  gap: 34px;
}
.feature {
  width: max-content;
  color: white;
  font-size: 30px;
  font-family: "Cormorant Garamond", serif;
  font-weight: 300;
  border-bottom: 1px solid rgba(255,255,255,.7);
  padding-bottom: 10px;
}

/* desktop screen mockup */
.desktopWrap {
  position: absolute;
  right: 320px;
  top: 42px;
  width: 760px;
  z-index: 2;
}
.desktopFrame {
  position: relative;
  width: 100%;
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.22);
  box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 80px 120px rgba(0,0,0,.65);
  background: #1a1a2e;
}
.desktopFrame img {
  width: 100%;
  display: block;
}

/* right cropped element */
.sideCrop {
  position: absolute;
  right: -120px;
  top: 250px;
  width: 430px;
  border-left: 1px solid rgba(255,255,255,.08);
  overflow: hidden;
  opacity: .78;
}
.sideCrop img {
  width: 100%;
  display: block;
}

/* phone mockup */
.phone {
  position: absolute;
  right: 250px;
  top: 180px;
  width: 250px;
  height: 520px;
  border-radius: 48px;
  padding: 12px;
  background: linear-gradient(145deg,#2b2b2b,#090909);
  box-shadow: 0 30px 80px rgba(0,0,0,.65), inset 0 0 0 1px rgba(255,255,255,.18);
  z-index: 10;
}
.phone::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  width: 108px;
  height: 26px;
  border-radius: 20px;
  background: black;
  z-index: 5;
}
.phoneScreen {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: 36px;
  background: #111122;
}
.phoneScreen img {
  width: 100%;
  height: auto;
  object-fit: cover;
  object-position: top center;
}

/* ambient glow */
.glow {
  position: absolute;
  width: 700px;
  height: 700px;
  right: -120px;
  top: -180px;
  background: radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);
  filter: blur(50px);
  pointer-events: none;
  z-index: 0;
}

/* ---------- EDITOR OVERLAY SYSTEM ---------- */
.editor-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2000;
}
.controls-panel {
  position: absolute;
  top: 24px;
  right: 24px;
  display: flex;
  gap: 12px;
  pointer-events: auto;
  z-index: 2100;
}
.editor-btn {
  background: rgba(20, 20, 25, 0.8);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 40px;
  padding: 10px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.3px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.editor-btn:hover {
  background: rgba(40, 40, 48, 0.9);
  border-color: rgba(255,255,255,0.5);
  transform: scale(0.98);
}
.close-editor {
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(12px);
  width: 42px;
  height: 42px;
  border-radius: 42px;
  padding: 0;
  justify-content: center;
  font-size: 18px;
  font-weight: 300;
}
.export-btn {
  background: rgba(10, 10, 15, 0.85);
  border-color: rgba(255,255,255,0.35);
}

/* outline guides */
.outline-guides {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1990;
}
.guide-rect {
  position: absolute;
  border: 1px dashed rgba(255, 255, 255, 0.4);
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.15);
}
.guide-rect::after {
  content: "";
  position: absolute;
  top: -24px;
  left: 0;
  font-size: 10px;
  color: rgba(255,255,255,0.8);
  font-family: 'Inter', monospace;
  background: rgba(0,0,0,0.6);
  padding: 3px 10px;
  border-radius: 12px;
  backdrop-filter: blur(4px);
  white-space: nowrap;
  letter-spacing: 0.5px;
}
.guide-1::after { content: "EDITORIAL ZONE"; }
.guide-2::after { content: "DESKTOP MOCKUP"; }
.guide-3::after { content: "MOBILE PREVIEW"; }

/* floating sidebar editor */
.sidebar-editor {
  position: fixed;
  left: 24px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(18, 18, 22, 0.8);
  backdrop-filter: blur(20px);
  border-radius: 48px;
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  pointer-events: auto;
  z-index: 2100;
  transition: 0.2s;
}
.tool-item {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 32px;
  background: rgba(30,30,36,0.6);
  backdrop-filter: blur(4px);
  color: white;
  font-size: 20px;
  cursor: pointer;
  transition: 0.15s;
  border: 1px solid rgba(255,255,255,0.1);
}
.tool-item:hover {
  background: rgba(80,80,95,0.8);
  border-color: rgba(255,255,255,0.5);
  transform: scale(1.02);
}

/* CAPTURE MODE - hides all UI elements */
.capture-mode .sidebar-editor,
.capture-mode .controls-panel,
.capture-mode .outline-guides,
.capture-mode .editor-overlay {
  display: none !important;
}

/* responsiveness */
@media(max-width:1600px) {
  .title { font-size: 90px; }
  .desktopWrap { width: 650px; right: 260px; }
}
</style>
</head>
<body>

<section class="showcase">
  <div class="glow"></div>
  <div class="circle c1"></div>
  <div class="circle c2"></div>

  <div class="left">
    <div class="logoBox">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="white" stroke-width="1.5" fill="none"/>
        <path d="M35 50 L45 50 L45 35 L35 35 Z" fill="white" opacity="0.9"/>
        <path d="M55 50 L65 50 L65 35 L55 35 Z" fill="white" opacity="0.9"/>
        <rect x="38" y="55" width="24" height="18" rx="3" fill="white" opacity="0.7"/>
        <circle cx="50" cy="64" r="6" fill="#050505"/>
      </svg>
    </div>
    <h1 class="title">[headphones]</h1>
    <div class="features">
      <div class="feature">Modern UI</div>
      <div class="feature">Lightning Fast</div>
      <div class="feature">High Performance</div>
    </div>
  </div>

  <div class="desktopWrap">
    <div class="desktopFrame">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500'%3E%3Crect width='800' height='500' fill='%231a1a2e'/%3E%3Crect x='50' y='80' width='300' height='40' rx='6' fill='%232d2d44'/%3E%3Crect x='50' y='140' width='500' height='280' rx='12' fill='%2322223a'/%3E%3Ccircle cx='180' cy='300' r='60' fill='%23333355'/%3E%3Crect x='280' y='260' width='180' height='12' rx='4' fill='%23444466'/%3E%3Crect x='280' y='290' width='140' height='12' rx='4' fill='%23444466'/%3E%3Crect x='280' y='320' width='200' height='12' rx='4' fill='%23444466'/%3E%3Cpath d='M520 220 L580 280 L520 340' stroke='%23555577' stroke-width='3' fill='none'/%3E%3C/svg%3E" alt="desktop preview">
    </div>
  </div>

  <div class="sideCrop">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 800'%3E%3Crect width='600' height='800' fill='%231e1e2f'/%3E%3Ccircle cx='300' cy='300' r='120' fill='%232a2a4a' opacity='0.6'/%3E%3Cpath d='M200 500 L400 500 L350 650 L250 650 Z' fill='%23333355' opacity='0.5'/%3E%3C/svg%3E" alt="art direction">
  </div>

  <div class="phone">
    <div class="phoneScreen">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 250 500'%3E%3Crect width='250' height='500' fill='%23111122'/%3E%3Crect x='20' y='40' width='210' height='30' rx='6' fill='%232a2a44'/%3E%3Crect x='20' y='90' width='210' height='200' rx='12' fill='%2322223a'/%3E%3Ccircle cx='60' cy='190' r='35' fill='%23333355'/%3E%3Crect x='110' y='175' width='100' height='10' rx='3' fill='%23444466'/%3E%3Crect x='110' y='195' width='80' height='10' rx='3' fill='%23444466'/%3E%3Crect x='20' y='310' width='210' height='80' rx='12' fill='%2322223a'/%3E%3C/svg%3E" alt="mobile ui">
    </div>
  </div>
</section>

<!-- EDITOR OVERLAY -->
<div class="editor-overlay">
  <div class="controls-panel">
    <button class="editor-btn export-btn" id="exportCaptureBtn">📸 Export PNG</button>
    <button class="editor-btn close-editor" id="closeEditorBtn">✕</button>
  </div>
</div>

<!-- Sidebar editor -->
<div class="sidebar-editor" id="sidebarEditor">
  <div class="tool-item" title="Move">🎯</div>
  <div class="tool-item" title="Frame">📐</div>
  <div class="tool-item" title="Export">⬇️</div>
  <div class="tool-item" title="Layers">📁</div>
</div>

<!-- Outline guides -->
<div class="outline-guides" id="outlineGuides">
  <div class="guide-rect guide-1" id="guide1"></div>
  <div class="guide-rect guide-2" id="guide2"></div>
  <div class="guide-rect guide-3" id="guide3"></div>
</div>

<script>
(function() {
  let isExporting = false;
  let editorVisible = true;

  const editorOverlay = document.querySelector('.editor-overlay');
  const sidebar = document.getElementById('sidebarEditor');
  const outlines = document.getElementById('outlineGuides');
  const closeBtn = document.getElementById('closeEditorBtn');
  const exportBtn = document.getElementById('exportCaptureBtn');

  // Hide all editor UI
  function hideEditorUI() {
    if (editorOverlay) editorOverlay.style.display = 'none';
    if (sidebar) sidebar.style.display = 'none';
    if (outlines) outlines.style.display = 'none';
    editorVisible = false;
  }

  // Show all editor UI
  function showEditorUI() {
    if (editorOverlay) editorOverlay.style.display = 'block';
    if (sidebar) sidebar.style.display = 'flex';
    if (outlines) outlines.style.display = 'block';
    editorVisible = true;
    removeReactiveButton();
  }

  function removeReactiveButton() {
    const btn = document.getElementById('reactiveEditBtn');
    if (btn) btn.remove();
  }

  function createReactiveButton() {
    if (document.getElementById('reactiveEditBtn')) return;
    const btn = document.createElement('div');
    btn.id = 'reactiveEditBtn';
    btn.innerHTML = '✎ Edit Mode';
    btn.style.cssText = `
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(30,30,38,0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 40px;
      padding: 10px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      z-index: 10000;
      pointer-events: auto;
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
      transition: 0.2s;
    `;
    btn.onmouseenter = () => btn.style.background = 'rgba(80,80,100,0.95)';
    btn.onmouseleave = () => btn.style.background = 'rgba(30,30,38,0.9)';
    btn.onclick = () => showEditorUI();
    document.body.appendChild(btn);
  }

  // Close button - exit editing mode
  if (closeBtn) {
    closeBtn.addEventListener('click', () => {
      hideEditorUI();
      createReactiveButton();
    });
  }

  // Update guide positions based on actual element positions
  function updateGuidePositions() {
    const leftArea = document.querySelector('.left');
    const desktopWrap = document.querySelector('.desktopWrap');
    const phoneDiv = document.querySelector('.phone');
    
    const guide1 = document.getElementById('guide1');
    const guide2 = document.getElementById('guide2');
    const guide3 = document.getElementById('guide3');
    
    if (leftArea && guide1) {
      const rect = leftArea.getBoundingClientRect();
      guide1.style.top = rect.top + 'px';
      guide1.style.left = rect.left + 'px';
      guide1.style.width = rect.width + 'px';
      guide1.style.height = Math.min(rect.height, 420) + 'px';
    }
    
    if (desktopWrap && guide2) {
      const rect = desktopWrap.getBoundingClientRect();
      guide2.style.top = rect.top + 'px';
      guide2.style.left = rect.left + 'px';
      guide2.style.width = rect.width + 'px';
      guide2.style.height = rect.height + 'px';
    }
    
    if (phoneDiv && guide3) {
      const rect = phoneDiv.getBoundingClientRect();
      guide3.style.top = rect.top + 'px';
      guide3.style.left = rect.left + 'px';
      guide3.style.width = rect.width + 'px';
      guide3.style.height = rect.height + 'px';
    }
  }

  // Load html2canvas dynamically
  function loadHtml2Canvas() {
    return new Promise((resolve, reject) => {
      if (window.html2canvas) {
        resolve(window.html2canvas);
        return;
      }
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      script.onload = () => {
        if (window.html2canvas) resolve(window.html2canvas);
        else reject(new Error('html2canvas failed to load'));
      };
      script.onerror = () => reject(new Error('Failed to load html2canvas'));
      document.head.appendChild(script);
    });
  }

  // Perform clean PNG export - hides all UI automatically
  async function performExport() {
    if (isExporting) return;
    isExporting = true;
    
    // Hide reactive button temporarily
    const reactiveBtn = document.getElementById('reactiveEditBtn');
    if (reactiveBtn) reactiveBtn.style.display = 'none';
    
    // ENTER CAPTURE MODE - hides sidebar, controls, outlines via CSS
    document.body.classList.add('capture-mode');
    
    // Small delay for CSS to apply
    await new Promise(r => setTimeout(r, 50));
    
    try {
      await loadHtml2Canvas();
      const showcase = document.querySelector('.showcase');
      
      if (!showcase) throw new Error('Showcase element not found');
      
      const canvas = await html2canvas(showcase, {
        scale: 2.8,
        backgroundColor: '#050505',
        useCORS: true,
        logging: false,
        allowTaint: false
      });
      
      // Exit capture mode
      document.body.classList.remove('capture-mode');
      if (reactiveBtn) reactiveBtn.style.display = '';
      
      // Download PNG
      const link = document.createElement('a');
      const date = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
      link.download = `headphones_editorial_${date}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      
    } catch (err) {
      console.error('Export error:', err);
      document.body.classList.remove('capture-mode');
      if (reactiveBtn) reactiveBtn.style.display = '';
      alert('Export failed. Please check console for details.');
    } finally {
      isExporting = false;
    }
  }
  
  // Export button handler
  if (exportBtn) {
    exportBtn.addEventListener('click', (e) => {
      e.preventDefault();
      performExport();
    });
  }
  
  // Update guides on resize and load
  window.addEventListener('resize', () => {
    if (editorVisible) setTimeout(updateGuidePositions, 50);
  });
  
  window.addEventListener('load', () => {
    setTimeout(updateGuidePositions, 100);
  });
  
  // Tool item interactions
  const toolItems = document.querySelectorAll('.tool-item');
  toolItems.forEach(item => {
    item.addEventListener('click', () => {
      if (item.title === 'Frame') updateGuidePositions();
      if (item.title === 'Export') performExport();
    });
  });
  
  // Initial guide positions
  setTimeout(updateGuidePositions, 150);
  
  // Remove reactive button if editor is visible initially
  removeReactiveButton();
  
  console.log('Editorial Studio ready — Capture Mode active. Click Export PNG for clean screenshot.');
})();
</script>
</body>
</html>
