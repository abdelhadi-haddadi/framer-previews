<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luxury Editorial Studio • Dynamic Hue</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#080808;
  font-family:'Inter',sans-serif;
  overflow:hidden;
  color:white;
  transition: background 0.2s ease;
}

.app{
  display:flex;
  width:100vw;
  height:100vh;
}

/* SIDEBAR — refined style */
.sidebar{
  width:360px;
  background:rgba(13,13,13,0.96);
  backdrop-filter: blur(2px);
  border-right:1px solid rgba(255,255,255,.08);
  padding:28px 24px;
  overflow-y:auto;
  z-index:200;
  scrollbar-width: thin;
}

.sidebar h2{
  margin-bottom:28px;
  font-size:22px;
  font-weight:500;
  letter-spacing:-0.2px;
  border-left:3px solid currentColor;
  padding-left:16px;
  color:#e6e6e6;
}

.field{
  margin-bottom:22px;
}

.field label{
  display:block;
  margin-bottom:8px;
  font-size:12px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:1px;
  opacity:.65;
}

.field input,
.field textarea{
  width:100%;
  border:none;
  outline:none;
  border-radius:14px;
  background:#171717;
  color:white;
  padding:12px 16px;
  font-size:14px;
  transition: all 0.2s;
  border:1px solid transparent;
}

.field input:focus,
.field textarea:focus{
  border-color: rgba(255,255,255,0.3);
  background:#1e1e1e;
}

.field textarea{
  resize:vertical;
  min-height:100px;
}

/* color picker row */
.color-row{
  display:flex;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}

.color-chip{
  flex:1;
  display:flex;
  align-items:center;
  gap:10px;
  background:#0f0f0f;
  border-radius:40px;
  padding:4px 12px 4px 8px;
  border:1px solid rgba(255,255,255,0.08);
}

.color-chip span{
  font-size:12px;
  opacity:0.7;
}

input[type="color"]{
  width:42px;
  height:38px;
  border:none;
  background:transparent;
  cursor:pointer;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  padding:3px;
}

.btn{
  width:100%;
  border:none;
  padding:14px;
  border-radius:40px;
  cursor:pointer;
  font-weight:600;
  margin-top:14px;
  font-size:14px;
  transition: transform 0.1s ease, background 0.2s;
}

.btn-white{
  background:white;
  color:black;
}
.btn-white:hover{
  background:#eaeaea;
  transform:scale(0.98);
}

.btn-dark{
  background:#1c1c1c;
  border:1px solid rgba(255,255,255,.15);
  color:white;
}
.btn-dark:hover{
  background:#2a2a2a;
}

/* PREVIEW AREA — dynamic background controlled by JS */
.preview{
  flex:1;
  position:relative;
  overflow:hidden;
  transition: background 0.25s ease;
}

/* grain overlay */
.preview::after{
  content:"";
  position:absolute;
  inset:0;
  opacity:.05;
  pointer-events:none;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  z-index:1;
}

/* elegant circles (glass) */
.circle{
  position:absolute;
  border-radius:50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent 70%);
  filter: blur(40px);
  pointer-events:none;
}
.c1{
  width:720px;
  height:720px;
  top:-380px;
  left:180px;
  opacity:0.5;
}
.c2{
  width:540px;
  height:540px;
  bottom:-220px;
  left:100px;
  opacity:0.4;
}

/* LEFT content */
.left{
  position:absolute;
  left:70px;
  top:110px;
  width:430px;
  z-index:20;
}

.logoBox{
  width:82px;
  height:82px;
  border:1px solid rgba(255,255,255,.4);
  backdrop-filter: blur(4px);
  background:rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:42px;
  border-radius:20px;
}

.logoBox img{
  width:48px;
  height:48px;
  object-fit:contain;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

.title{
  font-family:"Cormorant Garamond",serif;
  font-size:110px;
  line-height:.92;
  font-weight:300;
  letter-spacing:-3px;
  margin-bottom:70px;
  text-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.features{
  display:flex;
  flex-direction:column;
  gap:30px;
}

.feature{
  width:max-content;
  border-bottom:1.5px solid rgba(255,255,255,0.7);
  padding-bottom:8px;
  font-family:"Cormorant Garamond",serif;
  font-size:32px;
  font-weight:300;
  backdrop-filter: blur(2px);
}

/* DESKTOP mock */
.desktopWrap{
  position:absolute;
  top:40px;
  right:320px;
  width:720px;
  z-index:10;
  filter: drop-shadow(0 25px 35px -12px black);
}

.desktopFrame{
  overflow:hidden;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.25);
  background:#0a0a0a;
  box-shadow: 0 40px 60px -20px rgba(0,0,0,0.6);
}

.desktopFrame img{
  width:100%;
  display:block;
  transition: all 0.2s;
}

/* side bleed crop (abstract) */
.sideCrop{
  position:absolute;
  right:-100px;
  top:220px;
  width:400px;
  opacity:0.7;
  border-radius:28px;
  overflow:hidden;
  transform: rotate(2deg);
  filter: blur(1.2px);
  pointer-events:none;
  z-index:5;
}
.sideCrop img{
  width:100%;
  display:block;
}

/* PHONE mock */
.phone{
  position:absolute;
  top:170px;
  right:240px;
  width:260px;
  height:540px;
  border-radius:48px;
  padding:12px;
  background: linear-gradient(145deg,#2b2b2b,#0a0a0a);
  box-shadow: 0 45px 70px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,.2);
  z-index:30;
}
.phone::before{
  content:"";
  position:absolute;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  width:130px;
  height:28px;
  border-radius:30px;
  background:#111;
  z-index:4;
}
.phoneScreen{
  width:100%;
  height:100%;
  overflow:hidden;
  border-radius:38px;
  background:#000;
}
.phoneScreen img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top center;
}

/* capture mode (hide sidebar) */
.capture-mode .sidebar{
  display:none !important;
}
.capture-mode .preview{
  width:100vw !important;
}

/* SIMPLE FOOTER LINKS AT BOTTOM - elegant minimal */
.simple-footer {
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 100;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  letter-spacing: 0.5px;
  pointer-events: none;
}

.simple-footer .footer-links {
  display: inline-flex;
  gap: 28px;
  background: rgba(10, 10, 10, 0.65);
  backdrop-filter: blur(12px);
  padding: 8px 24px;
  border-radius: 60px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  pointer-events: auto;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

.simple-footer a {
  color: rgba(255, 255, 255, 0.8);
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 450;
  font-size: 12px;
}

.simple-footer a:hover {
  color: white;
  text-shadow: 0 0 6px rgba(255,255,255,0.3);
}

.separator {
  color: rgba(255,255,255,0.3);
  font-size: 12px;
}

@media(max-width:1500px){
  .title{
    font-size:85px;
  }
  .desktopWrap{
    width:600px;
    right:220px;
  }
  .phone{
    right:180px;
  }
  .simple-footer .footer-links {
    padding: 6px 20px;
    gap: 20px;
  }
  .simple-footer{
  position:absolute;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
}
}
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR with enhanced color inputs -->
  <div class="sidebar">

    <h2>LUXURY EDITORIAL</h2>

    <div class="field">
      <label>🌟 Main Title</label>
      <input type="text" id="titleInput" value="Aether Studio">
    </div>

    <div class="field">
      <label>✨ Features (one per line)</label>
      <textarea id="featuresInput">Immersive Acoustics
Smart Adaptive EQ
24h Battery Life
Premium Craftsmanship</textarea>
    </div>

    <div class="field">
      <label>🖼️ Logo (transparent png works best)</label>
      <input type="file" id="logoInput" accept="image/*">
    </div>

    <div class="field">
      <label>💻 Desktop / Laptop Screenshot</label>
      <input type="file" id="desktopInput" accept="image/*">
    </div>

    <div class="field">
      <label>📱 Mobile App / UI Screenshot</label>
      <input type="file" id="mobileInput" accept="image/*">
    </div>

    <!-- ✨ COLOR CONTROL SECTION ✨ -->
    <div class="field">
      <label>🎨 BACKGROUND COLOR (customize mood)</label>
      <div class="color-row">
        <div class="color-chip">
          <span>Base tone</span>
          <input type="color" id="bgColorPicker" value="#0a1a1f">
        </div>
        <div class="color-chip">
          <span>Accent glow</span>
          <input type="color" id="accentColorPicker" value="#4f7a85">
        </div>
      </div>
      <div style="font-size:11px; margin-top:8px; opacity:0.6;">▸ Deep background + radial aura</div>
    </div>

    <button class="btn btn-white" onclick="exportPNG()">
      📸 Export PNG (Full Canvas)
    </button>

    <button class="btn btn-dark" onclick="downloadHTML()">
      ⬇️ Export Standalone HTML
    </button>

  </div>

  <!-- PREVIEW CONTAINER (dynamic background) -->
  <div class="preview" id="preview">

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <!-- LEFT block -->
    <div class="left">
      <div class="logoBox">
        <img id="logoPreview" alt="logo">
      </div>
      <div class="title" id="titlePreview">
        Aether Studio
      </div>
      <div class="features" id="featuresPreview"></div>
    </div>

    <!-- DESKTOP frame -->
    <div class="desktopWrap">
      <div class="desktopFrame">
        <img id="desktopPreview" alt="desktop mock">
      </div>
    </div>

    <!-- PHONE mockup -->
    <div class="phone">
      <div class="phoneScreen">
        <img id="mobilePreview" alt="mobile ui">
      </div>
    </div>

    <!-- side bleeding crop (same as desktop) -->
    <div class="sideCrop">
      <img id="sidePreview" alt="side visual">
    </div>
<!-- SIMPLE FOOTER LINKS AT BOTTOM (clean, elegant) -->
<div class="simple-footer">
  <div class="footer-links">
    <a href="https://inspir.dev" target="_blank">@inspir.dev</a>
    <span class="separator">•</span>
    <a href="https://inspir.dev" target="_blank">inspir.dev</a>
    <span class="separator">•</span>
    <a href="#" target="_blank">Luxury Lab</a>
  </div>
</div>
  </div>
</div>



<script>
// DOM elements
const titleInput = document.getElementById("titleInput");
const featuresInput = document.getElementById("featuresInput");
const titlePreview = document.getElementById("titlePreview");
const featuresPreview = document.getElementById("featuresPreview");

const logoInput = document.getElementById("logoInput");
const desktopInput = document.getElementById("desktopInput");
const mobileInput = document.getElementById("mobileInput");

const logoPreview = document.getElementById("logoPreview");
const desktopPreview = document.getElementById("desktopPreview");
const mobilePreview = document.getElementById("mobilePreview");
const sidePreview = document.getElementById("sidePreview");

// color pickers
const bgColorPicker = document.getElementById("bgColorPicker");
const accentColorPicker = document.getElementById("accentColorPicker");

const previewContainer = document.getElementById("preview");

// ---- utility: read file to base64 ----
function readFileAsDataURL(file, callback) {
  const reader = new FileReader();
  reader.onload = e => callback(e.target.result);
  reader.readAsDataURL(file);
}

// ---- update title ----
titleInput.addEventListener("input", () => {
  titlePreview.textContent = titleInput.value || "Untitled";
});

// ---- update features list ----
function updateFeatures() {
  featuresPreview.innerHTML = "";
  const lines = featuresInput.value.split(/\r?\n/).filter(line => line.trim() !== "");
  lines.forEach(feature => {
    const div = document.createElement("div");
    div.className = "feature";
    div.textContent = feature.trim();
    featuresPreview.appendChild(div);
  });
}
updateFeatures();
featuresInput.addEventListener("input", updateFeatures);

// ---- image upload handlers ----
logoInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  readFileAsDataURL(file, (base64) => {
    logoPreview.src = base64;
  });
});

desktopInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  readFileAsDataURL(file, (base64) => {
    desktopPreview.src = base64;
    sidePreview.src = base64;    // side bleed mirrors desktop
  });
});

mobileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  readFileAsDataURL(file, (base64) => {
    mobilePreview.src = base64;
  });
});

/* ========== CORE FEATURE: DYNAMIC BACKGROUND COLOR + ACCENT GLOW ========== */
function updateBackgroundAndGlow() {
  const baseColor = bgColorPicker.value;        
  const accentColor = accentColorPicker.value;  
  
  // convert hex to rgb for gradient blending
  function hexToRgb(hex) {
    let h = hex.replace('#', '');
    if (h.length === 3) h = h.split('').map(c => c+c).join('');
    const r = parseInt(h.substring(0,2),16);
    const g = parseInt(h.substring(2,4),16);
    const b = parseInt(h.substring(4,6),16);
    return `${r},${g},${b}`;
  }
  
  const baseRgb = hexToRgb(baseColor);
  const accentRgb = hexToRgb(accentColor);
  
  // create a rich radial + linear mix: gives editorial luxury depth
  const dynamicGradient = `
    radial-gradient(circle at 10% 20%, rgba(${accentRgb}, 0.4) 0%, rgba(${baseRgb}, 0.92) 70%),
    linear-gradient(125deg, ${baseColor} 0%, #03080c 100%)
  `;
  
  previewContainer.style.background = dynamicGradient;
  
  // also adjust the floating circles to subtly reflect accent
  const circles = document.querySelectorAll('.circle');
  if (circles.length) {
    circles.forEach(circle => {
      circle.style.background = `radial-gradient(circle at 30% 30%, rgba(${accentRgb}, 0.28), rgba(0,0,0,0.5) 80%)`;
    });
  }
  
  // Optional: make border lines on left logo and feature borders harmonize
  const logoBoxDiv = document.querySelector('.logoBox');
  if (logoBoxDiv) {
    logoBoxDiv.style.borderColor = `rgba(255,255,255,0.55)`;
    logoBoxDiv.style.boxShadow = `0 0 14px rgba(${accentRgb}, 0.25)`;
  }
}

// apply initial colors (rich dark teal / slate)
bgColorPicker.value = "#0a1a1f";
accentColorPicker.value = "#4f7a85";
updateBackgroundAndGlow();

// event listeners for realtime background change (luxury on the fly)
bgColorPicker.addEventListener("input", updateBackgroundAndGlow);
accentColorPicker.addEventListener("input", updateBackgroundAndGlow);

/* EXPORT PNG — capture full editorial scene */
async function exportPNG() {
  document.body.classList.add("capture-mode");
  
  // Force a repaint to ensure background and colors are captured
  await new Promise(r => setTimeout(r, 100));
  
  html2canvas(document.getElementById("preview"), {
    useCORS: true,
    scale: 2.5,
    backgroundColor: null,
    logging: false,
    allowTaint: false
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "luxury-editorial-showcase.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    document.body.classList.remove("capture-mode");
  }).catch(err => {
    console.warn("capture error", err);
    document.body.classList.remove("capture-mode");
  });
}

/* EXPORT HTML: standalone version that preserves color input logic and all assets */
function downloadHTML() {
  const docHtml = document.documentElement.cloneNode(true);
  const htmlString = '<!DOCTYPE html>\n' + docHtml.outerHTML;
  const blob = new Blob([htmlString], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "luxury-editorial-dynamic.html";
  a.click();
  URL.revokeObjectURL(a.href);
}

// default placeholder images for better experience
function setPlaceholderImages() {
  if (!desktopPreview.src || desktopPreview.src === "" || desktopPreview.src === window.location.href || desktopPreview.src.endsWith("null")) {
    const placeholderSVG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500'%3E%3Crect width='800' height='500' fill='%231a1e24'/%3E%3Ctext x='50%25' y='50%25' font-size='22' fill='%23bbc' text-anchor='middle' dy='.3em' font-family='monospace'%3EDrop screenshot%3C/text%3E%3C/svg%3E";
    desktopPreview.src = placeholderSVG;
    sidePreview.src = placeholderSVG;
  }
  if (!mobilePreview.src || mobilePreview.src === "" || mobilePreview.src === window.location.href) {
    const mobilePlaceholder = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 600'%3E%3Crect width='300' height='600' fill='%2313161c'/%3E%3Ctext x='50%25' y='50%25' fill='%239aa' font-size='18' text-anchor='middle' font-family='monospace'%3Emobile UI%3C/text%3E%3C/svg%3E";
    mobilePreview.src = mobilePlaceholder;
  }
  if (!logoPreview.src || logoPreview.src === "" || logoPreview.src === window.location.href) {
    const defaultLogoSvg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,10 85,35 70,75 30,75 15,35' fill='none' stroke='white' stroke-width='2.2'/%3E%3C/svg%3E";
    logoPreview.src = defaultLogoSvg;
  }
}

// ensure placeholder & background after load
window.addEventListener("DOMContentLoaded", () => {
  setPlaceholderImages();
  updateBackgroundAndGlow();
});

// adjust footer visibility when capturing? keep it visible, but capture mode hides sidebar, footer stays.
// optional style: we don't want footer to overlap capture? but fine.
</script>
</body>
</html>
