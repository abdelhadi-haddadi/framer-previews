<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editorial Studio — Framer-Style Layers | Full Edit + Capture Mode</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    background: #050505;
    font-family: 'Inter', sans-serif;
  }

  /* MAIN SHOWCASE */
  .showcase {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at top left, rgba(255,255,255,.06), transparent 35%),
                linear-gradient(180deg, hsl(206,4%,24%) 0%, hsl(206,4%,8%) 100%);
  }

  .showcase::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: .12;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .circle {
    position: absolute;
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .c1 { width: 720px; height: 720px; left: 220px; top: -420px; }
  .c2 { width: 560px; height: 560px; left: 120px; bottom: -260px; }

  .left {
    position: absolute;
    left: 70px;
    top: 140px;
    width: 430px;
    z-index: 5;
  }
  .logoBox {
    width: 82px;
    height: 82px;
    border: 1px solid rgba(255,255,255,.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 42px;
    backdrop-filter: blur(4px);
    background: rgba(0,0,0,0.2);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    overflow: hidden;
  }
  .logoBox:hover {
    border-color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.15);
    transform: scale(1.02);
  }
  .logoBox img, .logoBox svg {
    width: 44px;
    height: 44px;
    display: block;
  }
  
  .title {
    color: white;
    font-family: "Cormorant Garamond", serif;
    font-size: 112px;
    line-height: .9;
    font-weight: 300;
    letter-spacing: -3px;
    margin-bottom: 70px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-block;
    width: 100%;
  }
  .title:hover {
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
  }
  .features {
    display: flex;
    flex-direction: column;
    gap: 34px;
  }
  .feature {
    width: max-content;
    color: white;
    font-size: 30px;
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    border-bottom: 1px solid rgba(255,255,255,.7);
    padding-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .feature:hover {
    border-bottom-color: rgba(255,255,255,1);
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
    transform: translateX(4px);
  }

  .desktopWrap {
    position: absolute;
    right: 320px;
    top: 42px;
    width: 760px;
    z-index: 2;
  }
  .desktopFrame {
    position: relative;
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.22);
    box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 80px 120px rgba(0,0,0,.65);
    background: #1a1a2e;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .desktopFrame:hover {
    border-color: rgba(255,255,255,0.5);
    transform: scale(1.01);
  }
  .desktopFrame img {
    width: 100%;
    display: block;
  }

  .sideCrop {
    position: absolute;
    right: -120px;
    top: 250px;
    width: 430px;
    border-left: 1px solid rgba(255,255,255,.08);
    overflow: hidden;
    opacity: .78;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .sideCrop:hover {
    opacity: 1;
    border-left-color: rgba(255,255,255,0.3);
  }
  .sideCrop img {
    width: 100%;
    display: block;
  }

  .phone {
    position: absolute;
    right: 250px;
    top: 180px;
    width: 250px;
    height: 520px;
    border-radius: 48px;
    padding: 12px;
    background: linear-gradient(145deg,#2b2b2b,#090909);
    box-shadow: 0 30px 80px rgba(0,0,0,.65), inset 0 0 0 1px rgba(255,255,255,.18);
    z-index: 10;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .phone:hover {
    transform: scale(1.02);
  }
  .phone::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 14px;
    transform: translateX(-50%);
    width: 108px;
    height: 26px;
    border-radius: 20px;
    background: black;
    z-index: 5;
  }
  .phoneScreen {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 36px;
    background: #111122;
  }
  .phoneScreen img {
    width: 100%;
    height: auto;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .glow {
    position: absolute;
    width: 700px;
    height: 700px;
    right: -120px;
    top: -180px;
    background: radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);
    filter: blur(50px);
    pointer-events: none;
    z-index: 0;
  }

  /* ========== EDITOR OVERLAY ========== */
  .editor-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2000;
    transition: opacity 0.2s ease, visibility 0.2s ease;
  }
  
  .controls-panel {
    position: absolute;
    top: 24px;
    right: 24px;
    display: flex;
    gap: 12px;
    pointer-events: auto;
    z-index: 2100;
  }
  
  .editor-btn {
    background: rgba(20, 20, 25, 0.8);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 40px;
    padding: 10px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  .editor-btn:hover {
    background: rgba(40, 40, 48, 0.95);
    border-color: rgba(255,255,255,0.5);
    transform: scale(0.98);
  }
  .close-editor {
    background: rgba(0, 0, 0, 0.7);
    width: 42px;
    height: 42px;
    border-radius: 42px;
    padding: 0;
    justify-content: center;
    font-size: 18px;
  }
  .export-btn { background: rgba(10, 10, 15, 0.85); }

  .outline-guides {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1990;
  }
  .guide-rect {
    position: absolute;
    border: 1px dashed rgba(255, 255, 255, 0.45);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.12);
  }
  .guide-rect::after {
    content: "";
    position: absolute;
    top: -24px;
    left: 0;
    font-size: 10px;
    color: rgba(255,255,255,0.85);
    font-family: 'Inter', monospace;
    background: rgba(0,0,0,0.65);
    padding: 3px 10px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }
  .guide-1::after { content: "EDITORIAL ZONE"; }
  .guide-2::after { content: "DESKTOP MOCKUP"; }
  .guide-3::after { content: "MOBILE PREVIEW"; }
  
  .sidebar-editor {
    position: fixed;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(18, 18, 22, 0.8);
    backdrop-filter: blur(20px);
    border-radius: 48px;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    pointer-events: auto;
    z-index: 2100;
  }
  .tool-item {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 32px;
    background: rgba(30,30,36,0.6);
    backdrop-filter: blur(4px);
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: 0.15s;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .tool-item:hover {
    background: rgba(80,80,95,0.9);
    border-color: rgba(255,255,255,0.5);
    transform: scale(1.02);
  }

  .reactive-edit-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(30,30,38,0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 40px;
    padding: 10px 22px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: white;
    cursor: pointer;
    z-index: 10000;
    pointer-events: auto;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
  }

  /* ========== FRAMER-STYLE LAYERS MODAL ========== */
  .layers-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    z-index: 100000;
    pointer-events: auto;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .layers-modal {
    width: 360px;
    height: 100%;
    background: rgba(18, 18, 22, 0.95);
    backdrop-filter: blur(24px);
    border-left: 1px solid rgba(255,255,255,0.15);
    box-shadow: -10px 0 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .layers-header {
    padding: 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .layers-header h2 {
    color: white;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .close-modal {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    transition: 0.2s;
  }
  .close-modal:hover {
    background: rgba(255,255,255,0.2);
  }
  .layers-search {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .layers-search input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    color: white;
    font-size: 13px;
    outline: none;
  }
  .layers-search input:focus {
    border-color: rgba(255,255,255,0.4);
  }
  .layers-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }
  .layer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 12px;
    margin: 4px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
  }
  .layer-item:hover {
    background: rgba(255,255,255,0.08);
    color: white;
  }
  .layer-item.selected {
    background: rgba(80,80,120,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
  }
  .layer-icon {
    width: 28px;
    font-size: 16px;
    text-align: center;
  }
  .layer-name {
    flex: 1;
  }
  .layer-badge {
    font-size: 10px;
    background: rgba(255,255,255,0.15);
    padding: 2px 8px;
    border-radius: 12px;
    font-family: monospace;
  }
  .layer-actions {
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .layer-item:hover .layer-actions {
    opacity: 1;
  }
  .layer-action {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.1s;
  }
  .layer-action:hover {
    background: rgba(255,255,255,0.25);
  }
  .layers-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-align: center;
  }

  /* class-based visibility */
  body.editor-hidden .editor-overlay,
  body.editor-hidden .sidebar-editor,
  body.editor-hidden .outline-guides,
  body.editor-hidden .reactive-edit-btn {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  body.capture-mode .editor-overlay,
  body.capture-mode .sidebar-editor,
  body.capture-mode .outline-guides,
  body.capture-mode .controls-panel,
  body.capture-mode .reactive-edit-btn {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }
  body.capture-mode, body.capture-mode * { cursor: default !important; }

  @media(max-width:1600px) {
    .title { font-size: 90px; }
    .desktopWrap { width: 650px; right: 260px; }
  }
</style>
</head>
<body>

<section class="showcase">
  <div class="glow"></div>
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="left">
    <div class="logoBox" id="logoBox">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="white" stroke-width="1.5" fill="none"/>
        <path d="M35 50 L45 50 L45 35 L35 35 Z" fill="white" opacity="0.9"/>
        <path d="M55 50 L65 50 L65 35 L55 35 Z" fill="white" opacity="0.9"/>
        <rect x="38" y="55" width="24" height="18" rx="3" fill="white" opacity="0.7"/>
        <circle cx="50" cy="64" r="6" fill="#050505"/>
      </svg>
    </div>
    <h1 class="title" id="mainTitle">[headphones]</h1>
    <div class="features">
      <div class="feature" id="feature1">Modern UI</div>
      <div class="feature" id="feature2">Lightning Fast</div>
      <div class="feature" id="feature3">High Performance</div>
    </div>
  </div>
  <div class="desktopWrap">
    <div class="desktopFrame" id="desktopFrame">
      <img id="desktopImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500'%3E%3Crect width='800' height='500' fill='%231a1a2e'/%3E%3Crect x='50' y='80' width='300' height='40' rx='6' fill='%232d2d44'/%3E%3Crect x='50' y='140' width='500' height='280' rx='12' fill='%2322223a'/%3E%3Ccircle cx='180' cy='300' r='60' fill='%23333355'/%3E%3Crect x='280' y='260' width='180' height='12' rx='4' fill='%23444466'/%3E%3Crect x='280' y='290' width='140' height='12' rx='4' fill='%23444466'/%3E%3Crect x='280' y='320' width='200' height='12' rx='4' fill='%23444466'/%3E%3Cpath d='M520 220 L580 280 L520 340' stroke='%23555577' stroke-width='3' fill='none'/%3E%3C/svg%3E" alt="desktop">
    </div>
  </div>
  <div class="sideCrop" id="sideCrop">
    <img id="sideCropImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 800'%3E%3Crect width='600' height='800' fill='%231e1e2f'/%3E%3Ccircle cx='300' cy='300' r='120' fill='%232a2a4a' opacity='0.6'/%3E%3Cpath d='M200 500 L400 500 L350 650 L250 650 Z' fill='%23333355' opacity='0.5'/%3E%3C/svg%3E" alt="side">
  </div>
  <div class="phone" id="phoneMockup">
    <div class="phoneScreen">
      <img id="phoneImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 250 500'%3E%3Crect width='250' height='500' fill='%23111122'/%3E%3Crect x='20' y='40' width='210' height='30' rx='6' fill='%232a2a44'/%3E%3Crect x='20' y='90' width='210' height='200' rx='12' fill='%2322223a'/%3E%3Ccircle cx='60' cy='190' r='35' fill='%23333355'/%3E%3Crect x='110' y='175' width='100' height='10' rx='3' fill='%23444466'/%3E%3Crect x='110' y='195' width='80' height='10' rx='3' fill='%23444466'/%3E%3Crect x='20' y='310' width='210' height='80' rx='12' fill='%2322223a'/%3E%3C/svg%3E" alt="mobile">
    </div>
  </div>
</section>

<div class="editor-overlay">
  <div class="controls-panel">
    <button class="editor-btn export-btn" id="exportCaptureBtn">📸 Export PNG</button>
    <button class="editor-btn close-editor" id="closeEditorBtn">✕</button>
  </div>
</div>
<div class="sidebar-editor" id="sidebarEditor">
  <div class="tool-item" title="Move">🎯</div>
  <div class="tool-item" title="Frame">📐</div>
  <div class="tool-item" title="Export">⬇️</div>
  <div class="tool-item" id="layersToolBtn" title="Layers">📁</div>
</div>
<div class="outline-guides" id="outlineGuides">
  <div class="guide-rect guide-1" id="guide1"></div>
  <div class="guide-rect guide-2" id="guide2"></div>
  <div class="guide-rect guide-3" id="guide3"></div>
</div>

<script>
(function() {
  // ========== LAYERS DATA (Framer-style) ==========
  const layersData = [
    { id: 'logoBox', name: 'Logo / Brand', icon: '🎧', type: 'image', elementId: 'logoBox' },
    { id: 'mainTitle', name: 'Headline Text', icon: 'T', type: 'text', elementId: 'mainTitle' },
    { id: 'feature1', name: 'Feature: Modern UI', icon: '✨', type: 'text', elementId: 'feature1' },
    { id: 'feature2', name: 'Feature: Lightning Fast', icon: '⚡', type: 'text', elementId: 'feature2' },
    { id: 'feature3', name: 'Feature: High Performance', icon: '🎯', type: 'text', elementId: 'feature3' },
    { id: 'desktopImage', name: 'Desktop Mockup', icon: '🖥️', type: 'image', elementId: 'desktopImage' },
    { id: 'sideCropImage', name: 'Art Direction (Side)', icon: '🎨', type: 'image', elementId: 'sideCropImage' },
    { id: 'phoneImage', name: 'Mobile Preview', icon: '📱', type: 'image', elementId: 'phoneImage' }
  ];

  let currentSelectedLayer = null;

  function openLayersModal() {
    const modal = document.createElement('div');
    modal.className = 'layers-modal-overlay';
    modal.innerHTML = `
      <div class="layers-modal">
        <div class="layers-header">
          <h2>📁 Layers <span style="font-size:11px; font-weight:400;">Framer-style</span></h2>
          <button class="close-modal" id="closeLayersModal">✕</button>
        </div>
        <div class="layers-search">
          <input type="text" id="layersSearch" placeholder="Filter layers...">
        </div>
        <div class="layers-list" id="layersList"></div>
        <div class="layers-footer">
          ${layersData.length} elements • Click to select • ✏️ to edit
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    function renderLayers(searchTerm = '') {
      const container = modal.querySelector('#layersList');
      const filtered = layersData.filter(layer => 
        layer.name.toLowerCase().includes(searchTerm.toLowerCase())
      );
      container.innerHTML = filtered.map(layer => `
        <div class="layer-item ${currentSelectedLayer === layer.id ? 'selected' : ''}" data-layer-id="${layer.id}">
          <div class="layer-icon">${layer.icon}</div>
          <div class="layer-name">${layer.name}</div>
          <div class="layer-badge">${layer.type}</div>
          <div class="layer-actions">
            <button class="layer-action edit-layer" data-id="${layer.id}" title="Edit">✏️</button>
            <button class="layer-action focus-layer" data-id="${layer.id}" title="Focus">🔍</button>
          </div>
        </div>
      `).join('');
      
      // Add event listeners to layer items
      container.querySelectorAll('.layer-item').forEach(item => {
        const layerId = item.dataset.layerId;
        const layer = layersData.find(l => l.id === layerId);
        
        item.addEventListener('click', (e) => {
          if (!e.target.classList.contains('layer-action')) {
            selectLayer(layerId);
            renderLayers(modal.querySelector('#layersSearch').value);
          }
        });
        
        const editBtn = item.querySelector('.edit-layer');
        if (editBtn) {
          editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            triggerEditForLayer(layer);
            modal.remove();
          });
        }
        
        const focusBtn = item.querySelector('.focus-layer');
        if (focusBtn) {
          focusBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            focusOnLayer(layer);
            modal.remove();
          });
        }
      });
    }
    
    function selectLayer(layerId) {
      currentSelectedLayer = layerId;
      const element = document.getElementById(layerId);
      if (element) {
        element.style.outline = '2px solid rgba(255,255,255,0.5)';
        element.style.outlineOffset = '4px';
        setTimeout(() => {
          if (currentSelectedLayer === layerId) {
            element.style.outline = '';
          }
        }, 1500);
        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
    
    function triggerEditForLayer(layer) {
      const element = document.getElementById(layer.elementId);
      if (!element) return;
      
      if (layer.type === 'text') {
        makeTextEditable(element, element.textContent);
      } else if (layer.type === 'image') {
        if (element.tagName === 'IMG') {
          makeImageEditable(element, element.src);
        } else if (layer.id === 'logoBox') {
          makeLogoEditable(element);
        }
      } else if (layer.id === 'logoBox') {
        makeLogoEditable(element);
      }
    }
    
    function focusOnLayer(layer) {
      const element = document.getElementById(layer.elementId);
      if (element) {
        element.style.outline = '3px solid rgba(100,150,255,0.8)';
        element.style.outlineOffset = '6px';
        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => {
          element.style.outline = '';
        }, 2000);
      }
    }
    
    const searchInput = modal.querySelector('#layersSearch');
    searchInput.addEventListener('input', (e) => renderLayers(e.target.value));
    
    const closeBtn = modal.querySelector('#closeLayersModal');
    closeBtn.addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    
    renderLayers('');
  }
  
  // ========== EDITING FUNCTIONS ==========
  function makeTextEditable(element, originalText) {
    const input = document.createElement('input');
    input.type = 'text';
    input.value = originalText;
    input.className = 'editable-input';
    const style = window.getComputedStyle(element);
    input.style.fontFamily = style.fontFamily;
    input.style.fontSize = style.fontSize;
    input.style.fontWeight = style.fontWeight;
    input.style.background = 'rgba(0,0,0,0.85)';
    input.style.border = '2px solid rgba(255,255,255,0.6)';
    input.style.color = 'white';
    input.style.borderRadius = '12px';
    input.style.padding = '8px 12px';
    input.style.outline = 'none';
    input.style.width = Math.max(element.offsetWidth, 180) + 'px';
    
    const parent = element.parentNode;
    parent.replaceChild(input, element);
    input.focus();
    input.select();
    
    function save() {
      const newValue = input.value.trim() || originalText;
      const newElement = document.createElement(element.tagName);
      newElement.className = element.className;
      newElement.id = element.id;
      newElement.textContent = newValue;
      newElement.style.cssText = element.style.cssText;
      newElement.addEventListener('click', (e) => {
        e.stopPropagation();
        makeTextEditable(newElement, newValue);
      });
      parent.replaceChild(newElement, input);
    }
    input.addEventListener('blur', save);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
  }
  
  function makeImageEditable(imgElement, currentSrc) {
    const modal = document.createElement('div');
    modal.className = 'image-upload-overlay';
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100000;';
    modal.innerHTML = `
      <div style="background:rgba(20,20,25,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.3);border-radius:24px;padding:32px;min-width:320px;text-align:center;">
        <h3 style="color:white;margin-bottom:20px;">✏️ Edit Image URL</h3>
        <input type="text" id="imgUrlInput" placeholder="Enter image URL..." value="${currentSrc.replace(/"/g, '&quot;')}" style="background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.3);border-radius:12px;padding:12px;color:white;width:100%;margin-bottom:16px;">
        <br>
        <button id="applyImgBtn" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:40px;padding:8px 20px;color:white;cursor:pointer;margin:0 8px;">Apply</button>
        <button id="cancelImgBtn" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:40px;padding:8px 20px;color:white;cursor:pointer;margin:0 8px;">Cancel</button>
      </div>
    `;
    document.body.appendChild(modal);
    const urlInput = modal.querySelector('#imgUrlInput');
    modal.querySelector('#applyImgBtn').addEventListener('click', () => {
      if (urlInput.value.trim()) imgElement.src = urlInput.value.trim();
      modal.remove();
    });
    modal.querySelector('#cancelImgBtn').addEventListener('click', () => modal.remove());
  }
  
  function makeLogoEditable(logoContainer) {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100000;';
    modal.innerHTML = `
      <div style="background:rgba(20,20,25,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.3);border-radius:24px;padding:32px;min-width:320px;text-align:center;">
        <h3 style="color:white;margin-bottom:20px;">🎨 Edit Logo</h3>
        <input type="text" id="logoUrlInput" placeholder="Image URL (PNG/SVG)" style="background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.3);border-radius:12px;padding:12px;color:white;width:100%;margin-bottom:16px;">
        <br>
        <button id="applyLogoBtn" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:40px;padding:8px 20px;color:white;cursor:pointer;margin:0 8px;">Apply</button>
        <button id="cancelLogoBtn" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:40px;padding:8px 20px;color:white;cursor:pointer;margin:0 8px;">Cancel</button>
      </div>
    `;
    document.body.appendChild(modal);
    const urlInput = modal.querySelector('#logoUrlInput');
    modal.querySelector('#applyLogoBtn').addEventListener('click', () => {
      if (urlInput.value.trim()) {
        const img = document.createElement('img');
        img.src = urlInput.value.trim();
        img.style.width = '44px';
        img.style.height = '44px';
        logoContainer.innerHTML = '';
        logoContainer.appendChild(img);
      }
      modal.remove();
    });
    modal.querySelector('#cancelLogoBtn').addEventListener('click', () => modal.remove());
  }
  
  // ========== EDITOR & CAPTURE MODE ==========
  let isExporting = false, editorActive = true;
  const bodyEl = document.body;
  const exportBtn = document.getElementById('exportCaptureBtn');
  const closeEditorBtn = document.getElementById('closeEditorBtn');
  const layersToolBtn = document.getElementById('layersToolBtn');
  
  if (layersToolBtn) layersToolBtn.addEventListener('click', () => openLayersModal());
  
  function removeReactiveButton() { document.querySelector('.reactive-edit-btn')?.remove(); }
  function createReactiveButton() {
    if (document.querySelector('.reactive-edit-btn')) return;
    const btn = document.createElement('div');
    btn.className = 'reactive-edit-btn';
    btn.textContent = '✎ Edit Mode';
    btn.onclick = () => { bodyEl.classList.remove('editor-hidden'); editorActive = true; removeReactiveButton(); updateGuidePositions(); };
    document.body.appendChild(btn);
  }
  function hideEditorUI() { if (!editorActive) return; bodyEl.classList.add('editor-hidden'); editorActive = false; createReactiveButton(); }
  if (closeEditorBtn) closeEditorBtn.onclick = (e) => { e.preventDefault(); hideEditorUI(); };
  
  function updateGuidePositions() {
    const leftArea = document.querySelector('.left');
    const desktopWrap = document.querySelector('.desktopWrap');
    const phoneDiv = document.querySelector('.phone');
    const g1 = document.getElementById('guide1'), g2 = document.getElementById('guide2'), g3 = document.getElementById('guide3');
    if (leftArea && g1) { const r = leftArea.getBoundingClientRect(); g1.style.cssText = `top:${r.top}px;left:${r.left}px;width:${r.width}px;height:${Math.min(r.height,420)}px;`; }
    if (desktopWrap && g2) { const r = desktopWrap.getBoundingClientRect(); g2.style.cssText = `top:${r.top}px;left:${r.left}px;width:${r.width}px;height:${r.height}px;`; }
    if (phoneDiv && g3) { const r = phoneDiv.getBoundingClientRect(); g3.style.cssText = `top:${r.top}px;left:${r.left}px;width:${r.width}px;height:${r.height}px;`; }
  }
  
  async function loadHtml2Canvas() {
    if (window.html2canvas) return window.html2canvas;
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      script.onload = () => window.html2canvas ? resolve(window.html2canvas) : reject();
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }
  
  async function performExport() {
    if (isExporting) return;
    isExporting = true;
    removeReactiveButton();
    bodyEl.classList.add('capture-mode');
    bodyEl.classList.remove('editor-hidden');
    await new Promise(r => setTimeout(r, 200));
    try {
      await loadHtml2Canvas();
      const canvas = await html2canvas(document.querySelector('.showcase'), { scale: 2.8, backgroundColor: '#050505', useCORS: true, logging: false });
      bodyEl.classList.remove('capture-mode');
      if (editorActive) bodyEl.classList.remove('editor-hidden');
      else { bodyEl.classList.add('editor-hidden'); createReactiveButton(); }
      const link = document.createElement('a');
      link.download = `headphones_${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) { console.error(e); bodyEl.classList.remove('capture-mode'); alert('Export failed'); }
    finally { isExporting = false; }
  }
  
  if (exportBtn) exportBtn.onclick = (e) => { e.preventDefault(); performExport(); };
  document.querySelectorAll('.tool-item').forEach(t => t.addEventListener('click', function() { if (this.title === 'Frame') updateGuidePositions(); if (this.title === 'Export') performExport(); }));
  window.addEventListener('resize', () => setTimeout(updateGuidePositions, 80));
  setTimeout(updateGuidePositions, 150);
  console.log('✨ Framer-style Layers Modal Active | Click 📁 to open');
})();
</script>
</body>
</html>
